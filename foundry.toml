[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
# CBOR metadata + ipfs hash MUST stay on: Blockscout "full match" verification
# requires the metadata fingerprint in the bytecode, and terminal scanners on
# 4663 show "Closed source" for anything less (partial match doesn't count).
# Clanker's config stripped these — that cost us a day of scanner archaeology.
bytecode_hash = "ipfs"
cbor_metadata = true
via_ir = true
evm_version = "cancun"
optimizer = true
optimizer_runs = 20_000

fs_permissions = [{ access = "read-write", path = "./deployments" }]

[rpc_endpoints]
robinhood = "https://rpc.mainnet.chain.robinhood.com"
local = "http://localhost:8545"

# Blockscout verification (Etherscan does not index chain 4663)
# forge verify-contract <addr> <src> --chain-id 4663 --verifier blockscout \
#   --verifier-url https://robinhoodchain.blockscout.com/api/

[fmt]
line_length = 100
number_underscore = "thousands"
sort_imports = true
tab_width = 4
